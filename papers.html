<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Papers | Euclid High-z Quasar Team</title>
    <meta
      name="description"
      content="Prototype papers page for the Euclid high-z quasar team."
    />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("euclid-site-theme");
          document.documentElement.dataset.theme =
            theme === "dark" || theme === "light" ? theme : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="assets/logo/icon.png" />
    <link rel="preload" as="image" href="assets/test/bh.png" />
    <link rel="preload" as="image" href="assets/test/bh_light.png" />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/published-sample.js"></script>
    <script defer src="assets/site-data.js"></script>
    <script defer src="assets/site.js"></script>
  </head>
  <body data-page="papers">
    <div class="site-scene" aria-hidden="true">
      <img
        class="site-blackhole-image site-blackhole-light"
        src="assets/test/bh_light.png"
        alt=""
        loading="eager"
        decoding="async"
        fetchpriority="high"
      />
      <img
        class="site-blackhole-image site-blackhole-dark"
        src="assets/test/bh.png"
        alt=""
        loading="eager"
        decoding="async"
        fetchpriority="high"
      />
    </div>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="assets/logo/Euclid_logo.png" alt="Euclid logo" />
          <span class="brand-copy">
            <small>Public Science Portal</small>
            <strong>Euclid High-z Quasar Team</strong>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a data-nav="home" href="index.html">Home</a>
          <a data-nav="explore" href="explore.html">Explore</a>
          <a data-nav="papers" href="papers.html">Papers</a>
          <a data-nav="data" href="data.html">Data</a>
          <a data-nav="team" href="team.html">Team</a>
        </nav>
      </header>
      <div class="site-header-controls">
        <div class="paper-view-toggle site-theme-switcher" aria-label="Theme mode">
          <button class="paper-view-button" type="button" data-theme-option="dark" aria-pressed="false">Dark</button>
          <span class="paper-view-separator" aria-hidden="true">/</span>
          <button class="paper-view-button" type="button" data-theme-option="light" aria-pressed="false">Light</button>
        </div>
      </div>

      <main>
        <section class="card-section">
          <div class="section-heading">
            <p class="eyebrow">Selected bibliography</p>
            <h2>All papers</h2>
          </div>
          <div class="paper-toolbar">
            <div class="paper-filters" id="paper-filters" aria-label="Paper keyword filters"></div>
            <div class="paper-view-toggle" id="paper-view-toggle" aria-label="Paper view mode"></div>
          </div>
          <div class="paper-grid" id="papers-grid"></div>
        </section>
      </main>

      <footer class="site-footer">
        <p></p>
        <p>Page designed by Daming Yang</p>
      </footer>
    </div>
  </body>
</html>
